name: Update Comfy Registry version

on:
  workflow_dispatch:
    inputs:
      node_id:
        description: Registry node ID
        required: true
        type: string
      version:
        description: Semantic version to update
        required: true
        type: string
      changelog:
        description: Release notes or migration guidance shown in the Registry
        required: true
        type: string
      deprecated:
        description: Whether this version is deprecated
        required: true
        default: false
        type: boolean

jobs:
  update-version:
    name: Update Registry version
    runs-on: ubuntu-latest
    steps:
      - name: Update version
        env:
          NODE_ID: ${{ inputs.node_id }}
          VERSION: ${{ inputs.version }}
          CHANGELOG: ${{ inputs.changelog }}
          DEPRECATED: ${{ inputs.deprecated }}
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          [[ "$NODE_ID" =~ ^[a-z0-9][a-z0-9-]*$ ]]
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          [[ -n "$CHANGELOG" ]]
          [[ "$DEPRECATED" == "true" || "$DEPRECATED" == "false" ]]
          [[ -n "$REGISTRY_ACCESS_TOKEN" ]]

          version_json="$(curl --fail --silent --show-error \
            "https://api.comfy.org/nodes/${NODE_ID}/versions/${VERSION}")"
          version_id="$(jq -r '.id // empty' <<<"$version_json")"
          [[ "$version_id" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]

          request_body="$(jq -n \
            --arg changelog "$CHANGELOG" \
            --argjson deprecated "$DEPRECATED" \
            '{changelog: $changelog, deprecated: $deprecated}')"
          response="$(curl --fail --silent --show-error \
            --request PUT \
            --url "https://api.comfy.org/publishers/teenu/nodes/${NODE_ID}/versions/${version_id}" \
            --header "Authorization: Bearer ${REGISTRY_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$request_body")"

          jq -e \
            --arg changelog "$CHANGELOG" \
            --argjson deprecated "$DEPRECATED" \
            '.changelog == $changelog and .deprecated == $deprecated' \
            <<<"$response"
