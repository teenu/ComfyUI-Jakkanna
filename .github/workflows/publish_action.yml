name: Publish to Comfy registry
on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish-node:
    name: Publish Custom Node to registry
    needs: test
    runs-on: ubuntu-latest
    env:
      COMFY_NODE_CHANGELOG: >-
        Adds deterministic FBX animation import, offline pinned loader modules,
        posed OBJ/GLB export, and canonical Krea 2 plus SCAIL-2 Fast and
        Production workflows with validation and reproducibility manifests.
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
